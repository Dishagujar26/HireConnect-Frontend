<div class="edit-job-page">
  <section class="page-header">
    <div>
      <p class="page-label">Recruiter workspace</p>
      <h1>Edit Job</h1>
      <p class="page-subtitle">Update this job posting and keep your hiring information current.</p>
    </div>

    <a routerLink="/recruiter/jobs" class="secondary-btn">← Back to Jobs</a>
  </section>

  <section class="form-card">
    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="loading-state" *ngIf="isFetching">Loading job details...</div>

    <form *ngIf="!isFetching" #jobForm="ngForm" (ngSubmit)="onSubmit(jobForm)" novalidate>
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Job Title</label>
          <input [(ngModel)]="job.title" name="title" required />
        </div>

        <div class="form-group full-width">
          <label>Description</label>
          <textarea [(ngModel)]="job.description" name="description" required></textarea>
        </div>

        <div class="form-group">
          <label>Company Name</label>
          <input [(ngModel)]="job.companyName" name="companyName" required />
        </div>

        <div class="form-group">
          <label>Location</label>
          <input [(ngModel)]="job.location" name="location" required />
        </div>

        <div class="form-group">
          <label>Job Type</label>
          <select [(ngModel)]="job.jobType" name="jobType" required>
            <option *ngFor="let type of jobTypes" [value]="type">{{ type }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Experience Level</label>
          <select [(ngModel)]="job.experienceLevel" name="experienceLevel" required>
            <option *ngFor="let level of experienceLevels" [value]="level">{{ level }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Minimum Salary</label>
          <input type="number" [(ngModel)]="job.salaryMin" name="salaryMin" required min="0" />
        </div>

        <div class="form-group">
          <label>Maximum Salary</label>
          <input type="number" [(ngModel)]="job.salaryMax" name="salaryMax" required min="0" />
        </div>

        <div class="form-group full-width">
          <label>Skills Required</label>
          <input [(ngModel)]="job.skillsRequired" name="skillsRequired" required />
        </div>

        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="job.status" name="status" required>
            <option *ngFor="let status of jobStatuses" [value]="status">{{ status }}</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <a routerLink="/recruiter/jobs" class="secondary-btn">Cancel</a>
        <button type="submit" class="primary-btn" [disabled]="isLoading">
          {{ isLoading ? 'Updating...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </section>
</div>
